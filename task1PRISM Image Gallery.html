<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PRISM — Image Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --accent: #e8c97a;
    --accent2: #c4533a;
    --text: #f0ece4;
    --muted: #666;
    --white: #ffffff;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    padding: 2rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: var(--white);
  }
  .logo span { color: var(--accent); }

  .filters {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    padding: 0.4rem 1rem;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.25s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,201,122,0.06);
  }

  .hero {
    padding: 4rem 3rem 2rem;
    display: flex;
    align-items: baseline;
    gap: 2rem;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 900;
    font-style: italic;
    line-height: 0.9;
    color: var(--white);
  }
  .hero-sub {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
  }

  .gallery-wrap { padding: 1rem 3rem 4rem; }

  .gallery {
    columns: 4 220px;
    column-gap: 1rem;
  }

  .gallery-item {
    break-inside: avoid;
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid var(--border);
  }
  .gallery-item img {
    width: 100%;
    display: block;
    transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
    filter: grayscale(20%);
  }
  .gallery-item:hover img {
    transform: scale(1.06);
    filter: grayscale(0%);
  }
  .gallery-item .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.35s;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 1.2rem;
  }
  .gallery-item:hover .overlay { opacity: 1; }
  .overlay-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--white);
    font-style: italic;
  }
  .overlay-cat {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 0.2rem;
  }

  .tag {
    position: absolute;
    top: 0.8rem; left: 0.8rem;
    background: var(--accent2);
    color: var(--white);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    opacity: 0;
    transform: translateY(-6px);
    transition: all 0.3s;
  }
  .gallery-item:hover .tag {
    opacity: 1;
    transform: translateY(0);
  }

  .gallery-item.hidden { display: none; }

  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 999;
    display: none;
    place-items: center;
    grid-template-columns: 60px 1fr 60px;
    align-items: center;
    padding: 2rem;
    gap: 1rem;
  }
  .lightbox.open { display: grid; }

  .lightbox-img-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    max-height: 90vh;
  }
  .lightbox-img-wrap img {
    max-height: 78vh;
    max-width: 100%;
    object-fit: contain;
    border: 1px solid var(--border);
    animation: lbIn 0.3s ease;
  }
  @keyframes lbIn {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1); }
  }
  .lightbox-caption { margin-top: 1rem; text-align: center; }
  .lightbox-caption h2 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.4rem;
    color: var(--white);
  }
  .lightbox-caption p {
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  .lb-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--white);
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 1.4rem;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .lb-btn:hover { border-color: var(--accent); color: var(--accent); }

  .lb-close {
    position: absolute;
    top: 1.5rem; right: 1.5rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--white);
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.2s;
    z-index: 1000;
  }
  .lb-close:hover { border-color: var(--accent2); color: var(--accent2); }

  .lb-counter {
    position: absolute;
    bottom: 1.5rem; right: 1.5rem;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  @media (max-width: 768px) {
    header { padding: 1.2rem 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .gallery-wrap { padding: 1rem 1.5rem 3rem; }
    .hero { padding: 3rem 1.5rem 1rem; }
    .gallery { columns: 2 140px; }
    .lightbox { grid-template-columns: 40px 1fr 40px; padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">PRI<span>S</span>M</div>
  <div class="filters">
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="nature">Nature</button>
    <button class="filter-btn" data-cat="city">City</button>
    <button class="filter-btn" data-cat="abstract">Abstract</button>
    <button class="filter-btn" data-cat="portrait">Portrait</button>
  </div>
</header>

<div class="hero">
  <h1>Visual<br/>Archive</h1>
  <span class="hero-sub">Gallery Collection 2024</span>
</div>

<div class="gallery-wrap">
  <div class="gallery" id="gallery"></div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lb-btn" id="lb-prev">&#8592;</button>
  <div class="lightbox-img-wrap">
    <img id="lb-img" src="" alt=""/>
    <div class="lightbox-caption">
      <h2 id="lb-title"></h2>
      <p id="lb-cat"></p>
    </div>
  </div>
  <button class="lb-btn" id="lb-next">&#8594;</button>
  <button class="lb-close" id="lb-close">&#x2715;</button>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<script>
  const images = [
    { src:'https://picsum.photos/seed/prism1/600/800',   title:'Forest Dawn',      cat:'nature'   },
    { src:'https://picsum.photos/seed/prism2/600/400',   title:'Steel & Glass',    cat:'city'     },
    { src:'https://picsum.photos/seed/prism3/600/600',   title:'Crimson Veil',     cat:'abstract' },
    { src:'https://picsum.photos/seed/prism4/600/900',   title:'Golden Hour',      cat:'nature'   },
    { src:'https://picsum.photos/seed/prism5/600/500',   title:'Night Pulse',      cat:'city'     },
    { src:'https://picsum.photos/seed/prism6/600/700',   title:'Silence',          cat:'portrait' },
    { src:'https://picsum.photos/seed/prism7/600/450',   title:'Urban Geometry',   cat:'city'     },
    { src:'https://picsum.photos/seed/prism8/600/800',   title:'Fluid Motion',     cat:'abstract' },
    { src:'https://picsum.photos/seed/prism9/600/600',   title:'Deep Roots',       cat:'nature'   },
    { src:'https://picsum.photos/seed/prism10/600/700',  title:'Gaze',             cat:'portrait' },
    { src:'https://picsum.photos/seed/prism11/600/400',  title:'Neon Reflections', cat:'city'     },
    { src:'https://picsum.photos/seed/prism12/600/850',  title:'Vapor',            cat:'abstract' },
    { src:'https://picsum.photos/seed/prism13/600/550',  title:'Misty Mountain',   cat:'nature'   },
    { src:'https://picsum.photos/seed/prism14/600/650',  title:'Reverie',          cat:'portrait' },
    { src:'https://picsum.photos/seed/prism15/600/400',  title:'Concrete Jungle',  cat:'city'     },
    { src:'https://picsum.photos/seed/prism16/600/750',  title:'Fractal Dream',    cat:'abstract' },
  ];

  const gallery   = document.getElementById('gallery');
  const lightbox  = document.getElementById('lightbox');
  const lbImg     = document.getElementById('lb-img');
  const lbTitle   = document.getElementById('lb-title');
  const lbCat     = document.getElementById('lb-cat');
  const lbCounter = document.getElementById('lb-counter');
  let currentIdx  = 0;
  let visibleItems = [];

  images.forEach((img, i) => {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.dataset.cat = img.cat;
    item.dataset.idx = i;
    item.innerHTML = `
      <span class="tag">${img.cat}</span>
      <img src="${img.src}" alt="${img.title}" loading="lazy"/>
      <div class="overlay">
        <div class="overlay-title">${img.title}</div>
        <div class="overlay-cat">${img.cat}</div>
      </div>`;
    item.addEventListener('click', () => openLightbox(i));
    gallery.appendChild(item);
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const cat = btn.dataset.cat;
      [...gallery.querySelectorAll('.gallery-item')].forEach(item => {
        item.classList.toggle('hidden', cat !== 'all' && item.dataset.cat !== cat);
      });
    });
  });

  function getVisible() {
    const active = document.querySelector('.filter-btn.active').dataset.cat;
    return images.map((img, i) => ({ ...img, i }))
      .filter(img => active === 'all' || img.cat === active);
  }

  function openLightbox(globalIdx) {
    visibleItems = getVisible();
    const pos = visibleItems.findIndex(v => v.i === globalIdx);
    currentIdx = pos >= 0 ? pos : 0;
    showImage();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function showImage() {
    const img = visibleItems[currentIdx];
    lbImg.style.opacity = '0';
    lbImg.style.transform = 'scale(0.97)';
    setTimeout(() => {
      lbImg.src = img.src;
      lbImg.alt = img.title;
      lbTitle.textContent = img.title;
      lbCat.textContent   = img.cat;
      lbCounter.textContent = `${currentIdx + 1} / ${visibleItems.length}`;
      lbImg.style.opacity   = '1';
      lbImg.style.transform = 'scale(1)';
      lbImg.style.transition = 'opacity 0.3s, transform 0.3s';
    }, 100);
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('lb-prev').addEventListener('click', () => {
    currentIdx = (currentIdx - 1 + visibleItems.length) % visibleItems.length;
    showImage();
  });
  document.getElementById('lb-next').addEventListener('click', () => {
    currentIdx = (currentIdx + 1) % visibleItems.length;
    showImage();
  });
  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'ArrowLeft')  document.getElementById('lb-prev').click();
    if (e.key === 'ArrowRight') document.getElementById('lb-next').click();
    if (e.key === 'Escape')     closeLightbox();
  });
</script>
</body>
</html>
